<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Option 4: O₂-Molekül – minimalistisch, zwei verbundene Kreise -->
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a0a1a"/>
  <!-- Bond line -->
  <line x1="196" y1="256" x2="316" y2="256" stroke="url(#g4)" stroke-width="6" opacity="0.4"/>
  <!-- Left O atom -->
  <circle cx="190" cy="256" r="60" fill="none" stroke="url(#g4)" stroke-width="5" opacity="0.75"/>
  <circle cx="190" cy="256" r="18" fill="url(#g4)" opacity="0.5"/>
  <!-- Right O atom -->
  <circle cx="322" cy="256" r="60" fill="none" stroke="url(#g4)" stroke-width="5" opacity="0.75"/>
  <circle cx="322" cy="256" r="18" fill="url(#g4)" opacity="0.5"/>
  <!-- Small "2" subscript hint -->
  <text x="360" y="330" font-family="Albert Sans, sans-serif" font-size="40" font-weight="600" fill="url(#g4)" opacity="0.5">₂</text>
</svg>